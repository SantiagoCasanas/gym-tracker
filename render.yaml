# Render Blueprint — Gym Tracker (API + SPA)  ·  Base de datos: Neon (externa)
# Docs: https://render.com/docs/blueprint-spec
#
# La base de datos NO se crea en Render (su free expira a los 30 días).
# Se usa Neon (https://neon.tech, Postgres gratis persistente): crea la BD ahí,
# copia la connection string y pégala como DATABASE_URL en el servicio API.
#
# On first deploy, set the sync:false env vars in the Render dashboard
# (DATABASE_URL de Neon, admin credentials, SMTP, y las URLs frontend/backend).
# JWT_SECRET se genera automáticamente.

services:
  # --- Backend API (Node + Express + Prisma) ---
  - type: web
    name: gym-tracker-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build && npm run seed
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      # Connection string de Neon (Dashboard → Connection Details → "Prisma"/URI).
      # Debe terminar en ?sslmode=require
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      # Set these in the dashboard after the first deploy.
      - key: APP_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false

  # --- Frontend (React SPA served as a static site) ---
  - type: web
    name: gym-tracker-web
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Point this at the deployed API URL (https://gym-tracker-api.onrender.com).
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
