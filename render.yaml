# Render Blueprint — Gym Tracker (Postgres + API + SPA)
# Docs: https://render.com/docs/blueprint-spec
#
# On first deploy, set the sync:false env vars in the Render dashboard
# (admin credentials, SMTP, the frontend/backend URLs). DATABASE_URL and
# JWT_SECRET are provisioned automatically.

databases:
  - name: gym-tracker-db
    plan: free

services:
  # --- Backend API (Node + Express + Prisma) ---
  - type: web
    name: gym-tracker-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install && npx prisma generate && npx prisma db push && npm run build && npm run seed
    startCommand: node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gym-tracker-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # Set these in the dashboard after the first deploy.
      - key: APP_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: MAIL_FROM
        sync: false

  # --- Frontend (React SPA served as a static site) ---
  - type: web
    name: gym-tracker-web
    runtime: static
    rootDir: .
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      # Point this at the deployed API URL (https://gym-tracker-api.onrender.com).
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
